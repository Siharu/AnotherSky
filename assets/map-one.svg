<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="holoBg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#031c1e"/>
      <stop offset="60%" stop-color="#01100f"/>
      <stop offset="100%" stop-color="#000605"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38f5d6" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#38f5d6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#38f5d6" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36,0 L0,0 L0,36" fill="none" stroke="#0d5a52" stroke-width="0.6" opacity="0.35"/>
    </pattern>
    <radialGradient id="scanCenter" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#38f5d6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#38f5d6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- base -->
  <rect width="900" height="700" fill="url(#holoBg)"/>
  <rect width="900" height="700" fill="url(#grid)"/>
  <rect width="900" height="700" fill="url(#scanCenter)"/>

  <!-- outer hex frame -->
  <polygon points="450,30 830,160 830,540 450,670 70,540 70,160"
    fill="none" stroke="#38f5d6" stroke-width="1.4" opacity="0.55" filter="url(#glowSoft)"/>
  <polygon points="450,50 810,172 810,528 450,650 90,528 90,172"
    fill="none" stroke="#38f5d6" stroke-width="0.7" opacity="0.3" stroke-dasharray="2 6"/>

  <!-- corner brackets -->
  <g stroke="#38f5d6" stroke-width="2" fill="none" opacity="0.85" filter="url(#glowSoft)">
    <path d="M40,40 L40,80 M40,40 L80,40"/>
    <path d="M860,40 L860,80 M860,40 L820,40"/>
    <path d="M40,660 L40,620 M40,660 L80,660"/>
    <path d="M860,660 L860,620 M860,660 L820,660"/>
  </g>

  <!-- scanned boundary of the known area -->
  <path d="M60,140 C160,90 300,110 380,70 C480,30 620,50 700,110
           C790,150 830,260 800,360 C860,420 840,540 760,600
           C700,660 560,650 470,610 C380,650 220,650 150,570
           C70,520 40,420 90,340 C40,280 30,200 60,140 Z"
    fill="none" stroke="#38f5d6" stroke-width="1.2" opacity="0.5" stroke-dasharray="3 5"/>

  <!-- roads / paths, laser-etched -->
  <g stroke="url(#cyan)" stroke-width="1.6" fill="none" filter="url(#glowSoft)" opacity="0.9">
    <path d="M180,470 C260,430 340,440 420,400 C500,360 560,370 640,330"/>
    <path d="M420,400 C430,300 400,220 430,150"/>
    <path d="M420,400 C460,470 460,540 430,600"/>
  </g>

  <!-- Relay Seven's power loop -->
  <path d="M430,150 C480,190 520,210 560,260 C600,310 610,360 590,410 C570,460 500,480 430,470 C380,462 350,430 340,400"
    stroke="#ff5b4d" stroke-width="1.6" fill="none" stroke-dasharray="7 5" opacity="0.85" filter="url(#redGlow)"/>

  <!-- the house node -->
  <g filter="url(#glow)">
    <polygon points="405,385 430,363 455,385" fill="none" stroke="#38f5d6" stroke-width="1.8"/>
    <rect x="410" y="385" width="40" height="26" fill="none" stroke="#38f5d6" stroke-width="1.8"/>
    <rect x="425" y="392" width="8" height="19" fill="none" stroke="#38f5d6" stroke-width="1.2"/>
    <circle cx="430" cy="398" r="26" fill="none" stroke="#38f5d6" stroke-width="0.6" opacity="0.4"/>
  </g>
  <text x="466" y="401" font-family="'Courier New', monospace" font-size="17" fill="#9cf7ea" filter="url(#glowSoft)">THE HOUSE</text>
  <text x="466" y="420" font-family="'Courier New', monospace" font-size="11" fill="#38f5d6" opacity="0.75">door: locked // do not force</text>

  <!-- Relay Seven node -->
  <g stroke="#ff5b4d" stroke-width="1.8" fill="none" filter="url(#redGlow)">
    <line x1="430" y1="150" x2="430" y2="112"/>
    <line x1="410" y1="130" x2="450" y2="130"/>
    <line x1="416" y1="116" x2="444" y2="144"/>
    <line x1="444" y1="116" x2="416" y2="144"/>
    <circle cx="430" cy="150" r="7"/>
  </g>
  <text x="452" y="120" font-family="'Courier New', monospace" font-size="17" fill="#ff9d92" filter="url(#glowSoft)">RELAY.07</text>

  <!-- signal fragment nodes -->
  <g fill="#38f5d6" filter="url(#glow)">
    <circle cx="270" cy="500" r="4"/>
    <circle cx="638" cy="220" r="4"/>
    <circle cx="700" cy="430" r="4"/>
    <circle cx="220" cy="290" r="4"/>
  </g>
  <g font-family="'Courier New', monospace" font-size="11" fill="#8fe9dc" opacity="0.85">
    <text x="205" y="522">frag_04 // waterlogged</text>
    <text x="655" y="216">frag_11 // unknown hand</text>
    <text x="640" y="450">frag_07 // page torn</text>
    <text x="135" y="284">frag_02 // not left by us</text>
  </g>

  <!-- the Monolith — flagged hostile -->
  <g stroke="#ff5b4d" stroke-width="1.8" fill="none" filter="url(#redGlow)">
    <polygon points="640,610 650,498 662,610"/>
    <polygon points="637,612 665,612" opacity="0.5"/>
  </g>
  <text x="545" y="638" font-family="'Courier New', monospace" font-size="12" fill="#ff9d92" filter="url(#glowSoft)">⚠ DO NOT APPROACH</text>

  <!-- compass / bearing readout, needle off true -->
  <g stroke="#38f5d6" fill="none" stroke-width="1.3" opacity="0.9" filter="url(#glowSoft)">
    <circle cx="110" cy="630" r="32"/>
    <circle cx="110" cy="630" r="24" opacity="0.4"/>
    <line x1="110" y1="630" x2="124" y2="592"/>
    <line x1="110" y1="630" x2="100" y2="666"/>
  </g>
  <text x="98" y="586" font-family="'Courier New', monospace" font-size="12" fill="#9cf7ea">N?</text>

  <!-- title, terminal style -->
  <text x="50" y="66" font-family="'Courier New', monospace" font-size="26" fill="#9cf7ea" filter="url(#glow)">MAP_01.DAT</text>
  <text x="50" y="88" font-family="'Courier New', monospace" font-size="12" fill="#38f5d6" opacity="0.75">// last stable render before the sky changed</text>

  <!-- scanline overlay -->
  <g opacity="0.06">
    <rect x="0" y="0" width="900" height="700" fill="transparent"/>
    <g stroke="#38f5d6" stroke-width="1">
      <line x1="0" y1="60" x2="900" y2="60"/>
      <line x1="0" y1="180" x2="900" y2="180"/>
      <line x1="0" y1="300" x2="900" y2="300"/>
      <line x1="0" y1="420" x2="900" y2="420"/>
      <line x1="0" y1="540" x2="900" y2="540"/>
      <line x1="0" y1="660" x2="900" y2="660"/>
    </g>
  </g>

  <rect width="900" height="700" fill="black" opacity="0.06"/>
</svg>
